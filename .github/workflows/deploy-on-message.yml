name: Deploy To Cloudflare On Deploy Commit

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    # Runs only if the last commit message in this push is exactly "deploy"
    if: ${{ github.event.head_commit.message == 'deploy' }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      WORKER_API_BASE: ${{ vars.WORKER_API_BASE }}
      PAGES_PROJECT_NAME: ${{ vars.CF_PAGES_PROJECT_NAME }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate deployment variables
        run: |
          if [ -z "$WORKER_API_BASE" ]; then
            echo "Missing repository variable WORKER_API_BASE"
            exit 1
          fi
          if [ -z "$PAGES_PROJECT_NAME" ]; then
            echo "Missing repository variable CF_PAGES_PROJECT_NAME"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing repository secret CF_API_TOKEN"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing repository secret CF_ACCOUNT_ID"
            exit 1
          fi
          if [[ "$CLOUDFLARE_API_TOKEN" != cfut_* ]]; then
            echo "CF_API_TOKEN has invalid format (expected to start with cfut_)"
            exit 1
          fi
          if [[ "$CLOUDFLARE_API_TOKEN" =~ [[:space:]] ]]; then
            echo "CF_API_TOKEN contains whitespace/newline. Store only the raw token string."
            exit 1
          fi
          if ! [[ "$CLOUDFLARE_ACCOUNT_ID" =~ ^[a-f0-9]{32}$ ]]; then
            echo "CF_ACCOUNT_ID must be a 32-char lowercase hex string."
            exit 1
          fi

      - name: Wrangler auth sanity check
        run: |
          npx wrangler --version
          npx wrangler whoami

      - name: Deploy Worker via Wrangler
        run: npx wrangler deploy

      - name: Build frontend for production
        run: |
          cd src/frontend
          VITE_API_BASE="$WORKER_API_BASE" npx vite build

      - name: Ensure Pages project exists
        run: |
          if npx wrangler pages project list | grep -q "$PAGES_PROJECT_NAME"; then
            echo "Pages project '$PAGES_PROJECT_NAME' already exists."
          else
            echo "Creating Pages project '$PAGES_PROJECT_NAME'..."
            npx wrangler pages project create "$PAGES_PROJECT_NAME" --production-branch main
          fi

      - name: Deploy frontend to Cloudflare Pages
        run: npx wrangler pages deploy src/frontend/dist --project-name "$PAGES_PROJECT_NAME"
